name: Pull Request Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run backend unit tests
        run: |
          mkdir -p test-results
          pytest tests -v --cov=app --cov-report=term-missing --junitxml=test-results/backend-pytest.xml

      - name: Publish backend test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: backend/test-results/backend-pytest.xml
          check_name: Backend Test Results

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: |
          mkdir -p test-results
          npx vitest run --reporter=default --reporter=junit --outputFile=test-results/frontend-vitest.xml

      - name: Publish frontend test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: frontend/test-results/frontend-vitest.xml
          check_name: Frontend Test Results
